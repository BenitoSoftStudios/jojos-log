<title>Jojo's Log 🦆</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#FDF8F3;--mint:#EAF6F1;--lavender:#F0EDF9;--sand:#F6F1EA;
  --text:#3D3530;--muted:#9A8F89;--border:rgba(61,53,48,0.10);--borderl:rgba(61,53,48,0.18);
  --acc:#E8A598;--grn:#7DBFA5;--pur:#B4A0D4;--sun:#F59E0B;
  --f:'Nunito',sans-serif;--f2:'Quicksand',sans-serif;
}
body{font-family:var(--f);background:var(--cream);color:var(--text);font-size:14px;min-height:100vh;padding-bottom:80px;}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(61,53,48,0.06);}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.hdr-l{display:flex;align-items:center;gap:10px;}
.hdr-title{font-family:var(--f2);font-size:19px;font-weight:700;line-height:1.2;}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.clk{font-family:var(--f2);font-size:11px;color:var(--grn);font-weight:700;}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.sync-dot.ok{background:#7DBFA5;}
.sync-dot.wait{background:#F59E0B;}
.sync-dot.err{background:#E87070;}
.sync-lbl{font-size:10px;font-weight:600;}
.hdr-btns{display:flex;gap:5px;flex-shrink:0;}
.btn{border:none;border-radius:18px;padding:7px 11px;font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-sand{background:var(--sand);color:var(--text);border:1px solid var(--borderl);}
.btn-grn{background:var(--grn);color:#fff;}
.btn-pur{background:var(--lavender);color:#7A6AB0;border:1px solid rgba(180,160,212,0.4);}
.btn-pur.on{background:var(--pur);color:#fff;border-color:var(--pur);}

/* LOADING */
.loading{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px;}
.loading .duck{font-size:32px;display:block;margin-bottom:12px;animation:bob 1.2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* STATS */
.stats{display:flex;gap:7px;padding:9px 14px;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.stats::-webkit-scrollbar{display:none;}
.pill{flex-shrink:0;background:var(--sand);border-radius:20px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;}
.pill b{color:var(--text);font-weight:800;}

/* LOG TREE */
.mo-block{border-bottom:1px solid var(--border);}
.mo-hdr{background:var(--lavender);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.mo-lbl{font-family:var(--f2);font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px;}
.mo-tot{font-size:12px;color:var(--muted);font-weight:600;}
.wk-hdr{background:var(--sand);padding:8px 14px 8px 26px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;border-top:1px solid var(--border);}
.wk-lbl{font-weight:700;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.wk-tot{font-size:12px;color:var(--muted);}
.dy-hdr{background:var(--mint);padding:8px 14px 8px 36px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;border-top:1px solid var(--border);}
.dy-lw{display:flex;align-items:center;gap:5px;}
.dy-lbl{font-weight:800;font-size:13px;}
.dy-warn{font-size:10px;color:#C06060;font-weight:700;}
.dy-tot{font-size:12px;color:var(--muted);}
.chv{font-size:11px;color:var(--muted);transition:transform .18s;display:inline-block;}
.chv.o{transform:rotate(90deg);}

/* TABLE */
.fw{padding:4px 8px 8px;}
.ft{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
.ft th{padding:5px 3px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);text-align:left;}
.th-t{width:100px;}.th-ml{width:60px;}.th-dp{width:100px;}.th-vd{width:32px;}.th-x{width:22px;}
.fr{border-bottom:1px solid var(--border);}
.fr:last-child{border-bottom:none;}
.fr.inc{background:#FEF3F3;}
.fr td{padding:6px 3px;vertical-align:middle;}
.i-time{width:100px;border:1px solid var(--border);border-radius:6px;padding:3px 4px;font-family:var(--f2);font-size:12px;font-weight:600;background:#fff;color:var(--text);text-align:center;-webkit-appearance:none;}
.i-ml{width:44px;border:1px solid var(--border);border-radius:6px;padding:3px;font-size:12px;text-align:right;background:#fff;color:var(--text);}
.i-ml.em{border-color:var(--acc);background:#FFF5F3;}
.mlu{font-size:10px;color:var(--muted);}
.i-notes{width:100%;border:1px solid var(--border);border-radius:5px;padding:3px 4px;font-size:11px;background:#fff;color:var(--text);}
.dbs{display:flex;gap:2px;}
.db{border:1px solid var(--border);border-radius:5px;padding:3px 5px;font-size:10px;font-weight:700;background:#fff;cursor:pointer;color:var(--muted);line-height:1.3;transition:all .1s;}
.db.ed{border-color:var(--acc)!important;background:#FFF5F3!important;}
.db.sW{background:#DBF0FC;border-color:#89C8E8;color:#1A5F88;}
.db.sP{background:#FEF3DC;border-color:#E8C065;color:#7A5000;}
.db.sWP{background:#E8F7E8;border-color:#80C985;color:#1A5A20;}
.db.sN{background:var(--sand);border-color:#C8B8A8;color:#5A4A3A;}
.vdb{border:1px solid var(--border);border-radius:5px;width:28px;height:26px;background:#fff;cursor:pointer;color:#C8B890;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.vdb.on{background:#FFF8E1;border-color:var(--sun);color:var(--sun);}
.xb{background:none;border:none;cursor:pointer;color:#D0B0B0;font-size:15px;padding:1px 3px;line-height:1;}
.add-btn{display:block;width:100%;margin-top:3px;background:none;border:1px dashed var(--acc);border-radius:7px;padding:5px;font-size:11px;color:var(--acc);cursor:pointer;font-weight:700;}

/* GRAPH */
#gview{display:none;padding:16px 14px 60px;}
#gview.vis{display:block;}
.gsec{margin-bottom:32px;}
.gtit{font-family:var(--f2);font-weight:700;font-size:14px;margin-bottom:10px;color:var(--text);}
.gchart{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(61,53,48,0.45);z-index:500;align-items:flex-end;justify-content:center;}
.ov.open{display:flex;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.modal h2{font-family:var(--f2);font-size:17px;font-weight:700;margin-bottom:14px;}
.modal label{display:block;font-size:11px;color:var(--muted);font-weight:700;margin:12px 0 4px;text-transform:uppercase;letter-spacing:.04em;}
.modal input{width:100%;border:1px solid var(--borderl);border-radius:8px;padding:10px 12px;font-size:15px;font-family:var(--f);background:#fff;color:var(--text);-webkit-appearance:none;}
.dgrid{display:flex;gap:8px;margin-top:4px;}
.dopt{flex:1;padding:10px 4px;border:1.5px solid var(--borderl);border-radius:8px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;background:#fff;color:var(--muted);}
.dopt.sW{background:#DBF0FC;border-color:#89C8E8;color:#1A5F88;}
.dopt.sP{background:#FEF3DC;border-color:#E8C065;color:#7A5000;}
.dopt.sWP{background:#E8F7E8;border-color:#80C985;color:#1A5A20;}
.dopt.sN{background:var(--sand);border-color:#C8B8A8;color:#5A4A3A;}
.mbtns{display:flex;gap:10px;margin-top:18px;}
.mbtn{flex:1;padding:13px;border-radius:10px;font-family:var(--f);font-size:14px;font-weight:800;cursor:pointer;}
.mbtn.cancel{background:#fff;border:1px solid var(--borderl);color:var(--muted);}
.mbtn.save{background:var(--grn);border:none;color:#fff;flex:2;}
</style>
</head>

<div class="hdr">

          <span class="sync-lbl" id="slbl" style="color:var(--muted)">connecting</span>
        </div>
      </div>
    </div>
    <div class="hdr-btns">
      <button class="btn btn-sand" onclick="exportCSV()">&#8595; CSV</button>
      <button class="btn btn-pur" id="gbtn" onclick="toggleGraph()">Graph</button>
      <button class="btn btn-grn" onclick="openDayModal()">+ Day</button>
    </div>
  </div>
</div>

<div id="stats" class="stats"></div>
<div id="app"><div class="loading"><span class="duck">🦆</span>Loading Jojo's data…</div></div>
<div id="gview"></div>

<div class="ov" id="ov">
  <div class="modal">
    <h2 id="mtit">Add feeding</h2>
    <div id="mdr">
      <label>Date</label>
      <input type="date" id="mdate">
    </div>
    <label>Time (24h)</label>
    <input type="time" id="mtime" step="60">
    <label>Amount (mL)</label>
    <input type="number" id="mml" placeholder="e.g. 90" min="0" max="999">
    <label>Diaper</label>
    <div class="dgrid">
      <div class="dopt" data-v="W" onclick="pickD('W')">W</div>
      <div class="dopt" data-v="P" onclick="pickD('P')">P</div>
      <div class="dopt" data-v="WP" onclick="pickD('WP')">WP</div>
      <div class="dopt" data-v="none" onclick="pickD('none')">None</div>
    </div>
    <input type="hidden" id="mdp">
    <label>Notes (optional)</label>
    <input type="text" id="mnotes" placeholder="e.g. emesis…">
    <div class="mbtns">
      <button class="mbtn cancel" onclick="closeModal()">Cancel</button>
      <button class="mbtn save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

// ── HELPERS ──
const pz = n => String(n).padStart(2,'0');
const mid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
function today(){ const n=new Date(); return n.getFullYear()+'-'+pz(n.getMonth()+1)+'-'+pz(n.getDate()); }
const isInc = f => (f.ml===''||f.ml==null) || (f.diaper===''||f.diaper==null);
const fmtD = ds => new Date(ds+"T12:00:00").toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric"});
function weekOf(ds){ const d=new Date(ds+"T12:00:00"),day=d.getDay()||7; d.setDate(d.getDate()-(day-1)); return d.toISOString().slice(0,10); }
const wkLbl = ds => "Week of "+new Date(ds+"T12:00:00").toLocaleDateString("en-CA",{month:"short",day:"numeric"});
function seedToFeeds(){
  return SEED
    .filter(r => r[1] && !(r[1]==='00:00' && r[2]==='' && r[3]==='' && r[4]===''))
    .map(r => ({id:mid(),date:r[0],time:r[1],ml:r[2]===''?'':+r[2],diaper:r[3],notes:r[4]||'',vitd:r[5]||0}));
}

// ── FIREBASE INIT ──
let db, COLL;
let feeds = [];
let gvis = false;
const CS = {M:{},W:{},D:{}};
let booted = false;

function setSyncStatus(state) {
  const dot = document.getElementById('sdot');
  const lbl = document.getElementById('slbl');
  if (!dot||!lbl) return;
  dot.className = 'sync-dot ' + (state==='ok'?'ok':state==='err'?'err':'wait');
  lbl.textContent = state==='ok'?'synced':state==='err'?'offline':'syncing…';
  lbl.style.color = state==='ok'?'var(--grn)':state==='err'?'#E87070':'var(--sun)';
}

async function initApp() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    // Enable offline persistence so the app works without internet too
    try { await db.enablePersistence(); } catch(e) { /* multi-tab mode, fine */ }
    COLL = db.collection('feeds');

    // Check if Firestore is empty → seed it with historical data
    const snap = await COLL.limit(1).get();
    if (snap.empty) {
      setSyncStatus('wait');
      const seedData = seedToFeeds();
      // Upload in batches of 400 (Firestore limit is 500)
      for (let i=0; i < seedData.length; i += 400) {
        const batch = db.batch();
        seedData.slice(i, i+400).forEach(f => batch.set(COLL.doc(f.id), f));
        await batch.commit();
      }
    }

    // Real-time listener — this is the source of truth for both devices
    COLL.orderBy('date').orderBy('time').onSnapshot(snapshot => {
      feeds = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
      setSyncStatus('ok');
      if (gvis) renderGraph(); else render();
    }, err => {
      console.error('Firestore error:', err);
      setSyncStatus('err');
    });

  } catch(err) {
    console.error('Firebase init failed:', err);
    setSyncStatus('err');
    // Fallback to local seed so the app still works
    feeds = seedToFeeds();
    render();
  }
}

// ── CLOCK ──
function tick(){
  const n=new Date();
  const ds=n.toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  const ts=pz(n.getHours())+':'+pz(n.getMinutes())+':'+pz(n.getSeconds());
  const de=document.getElementById('hdate'),ce=document.getElementById('hclk');
  if(de)de.textContent=ds; if(ce)ce.textContent=ts;
}
tick(); setInterval(tick,1000);

// ── GROUP ──
function group(){
  const M={};
  feeds.forEach(f=>{
    const mk=f.date.slice(0,7);
    const d=new Date(f.date+"T12:00:00");
    const ml=d.toLocaleDateString("en-CA",{month:"long",year:"numeric"});
    const wk=weekOf(f.date);
    if(!M[mk])M[mk]={label:ml,weeks:{},total:0};
    if(!M[mk].weeks[wk])M[mk].weeks[wk]={label:wkLbl(wk),days:{},total:0};
    if(!M[mk].weeks[wk].days[f.date])M[mk].weeks[wk].days[f.date]={feeds:[],total:0};
    const v=+f.ml||0;
    M[mk].weeks[wk].days[f.date].feeds.push(f);
    M[mk].weeks[wk].days[f.date].total+=v;
    M[mk].weeks[wk].total+=v;
    M[mk].total+=v;
  });
  return M;
}

// ── COLLAPSE STATE ──
function initCS(M){
  if(booted)return; booted=true;
  const sm=Object.keys(M).sort(),lm=sm[sm.length-1];
  sm.forEach(k=>{CS.M[k]=k===lm;});
  const sw=Object.keys(M[lm].weeks).sort(),lw=sw[sw.length-1];
  Object.values(M).forEach(m=>Object.keys(m.weeks).forEach(k=>{CS.W[k]=k===lw;}));
  const sd=Object.keys(M[lm].weeks[lw].days).sort(),ld=sd[sd.length-1];
  Object.values(M).forEach(m=>Object.values(m.weeks).forEach(w=>Object.keys(w.days).forEach(k=>{CS.D[k]=k===ld;})));
}

// ── STATS ──
function renderStats(){
  const td=today();
  const tf=feeds.filter(f=>f.date===td);
  const tml=tf.reduce((s,f)=>s+(+f.ml||0),0);
  const d7=new Date(); d7.setDate(d7.getDate()-6);
  const w7=d7.getFullYear()+'-'+pz(d7.getMonth()+1)+'-'+pz(d7.getDate());
  const w7ml=feeds.filter(f=>f.date>=w7).reduce((s,f)=>s+(+f.ml||0),0);
  const cm=td.slice(0,7),moml=feeds.filter(f=>f.date.startsWith(cm)).reduce((s,f)=>s+(+f.ml||0),0);
  document.getElementById('stats').innerHTML=
    '<div class="pill">Today <b>'+tml+' mL</b></div>'+
    '<div class="pill">7-day <b>'+w7ml.toLocaleString()+' mL</b></div>'+
    '<div class="pill">This month <b>'+moml.toLocaleString()+' mL</b></div>'+
    '<div class="pill">Feeds today <b>'+tf.length+'</b></div>';
}

// ── COLLAPSE ──
function tog(t,k){ CS[t][k]=!CS[t][k]; render(); }

// ── MUTATIONS (write to Firestore; onSnapshot re-renders both devices) ──
function upd(id,field,val){
  // Optimistic local update
  const i=feeds.findIndex(x=>x.id===id);
  if(i>=0){ feeds[i][field]=val; renderStats(); }
  // Persist to Firestore
  if(COLL) COLL.doc(id).update({[field]:val}).catch(e=>console.error('upd:',e));
}

function updML(id,inp){
  const v=inp.value===''?'':+inp.value;
  inp.classList.toggle('em',inp.value==='');
  upd(id,'ml',v);
  const f=feeds.find(x=>x.id===id),row=document.getElementById('r'+id);
  if(f&&row)row.classList.toggle('inc',isInc(f));
}

function setD(id,val,btn){
  const row=document.getElementById('r'+id);
  if(row)row.querySelectorAll('.db').forEach(b=>b.className='db');
  btn.className='db s'+val;
  upd(id,'diaper',val);
  const f=feeds.find(x=>x.id===id),row2=document.getElementById('r'+id);
  if(f&&row2)row2.classList.toggle('inc',isInc(f));
}

function togVitD(id){
  const i=feeds.findIndex(x=>x.id===id); if(i<0)return;
  feeds[i].vitd=feeds[i].vitd?0:1;
  const btn=document.getElementById('v'+id);
  if(btn)btn.className='vdb'+(feeds[i].vitd?' on':'');
  if(COLL) COLL.doc(id).update({vitd:feeds[i].vitd}).catch(e=>console.error('vitd:',e));
}

function delF(id){
  if(!confirm('Delete this entry?'))return;
  feeds=feeds.filter(f=>f.id!==id); render();
  if(COLL) COLL.doc(id).delete().catch(e=>console.error('del:',e));
}

function pickD(v){

function openFeedModal(dk){
  document.getElementById('mtit').textContent='Add feeding — '+fmtD(dk);

  document.getElementById('mdate').value=dk;
  const sf=feeds.filter(f=>f.date===dk).sort((a,b)=>a.time.localeCompare(b.time));
  let t='';
  if(sf.length&&sf[sf.length-1].time){
    const[h,m]=sf[sf.length-1].time.split(':').map(Number);
    const nx=new Date(2000,0,1,h,m); nx.setMinutes(nx.getMinutes()+180);
    t=pz(nx.getHours())+':'+pz(nx.getMinutes());

  document.getElementById('mtime').value=t;
  document.getElementById('mml').value='';
  document.getElementById('mnotes').value='';

  document.getElementById('mtit').textContent='Add new day';
  document.getElementById('mdr').style.display='';
  const dates=feeds.map(f=>f.date).sort();
  const last=dates[dates.length-1]||today();
  const nx=new Date(last+'T12:00:00'); nx.setDate(nx.getDate()+1);
  document.getElementById('mdate').value=nx.toISOString().slice(0,10);
  document.getElementById('mtime').value='';
  document.getElementById('mml').value='';
  document.getElementById('mnotes').value='';
  document.querySelectorAll('.dopt').forEach(e=>e.className='dopt');
  document.getElementById('mdp').value='';
  document.getElementById('ov').classList.add('open');
}
function closeModal(){ document.getElementById('ov').classList.remove('open'); }
document.getElementById('ov').addEventListener('click',e=>{ if(e.target===document.getElementById('ov'))closeModal(); });

function saveModal(){
  const date=document.getElementById('mdate').value;
  const time=document.getElementById('mtime').value;
  const mlr=document.getElementById('mml').value;
  const dp=document.getElementById('mdp').value;
  const notes=document.getElementById('mnotes').value.trim();
  if(!date){alert('Date required.');return;}
  if(!time){alert('Time required.');return;}
  const ml=mlr===''?'':+mlr;
  const feed={id:mid(),date,time,ml,diaper:dp,notes,vitd:0};
  // Optimistic local add
  feeds.push(feed);
  feeds.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  CS.M[date.slice(0,7)]=true; CS.W[weekOf(date)]=true; CS.D[date]=true;
  closeModal();
  if(gvis)renderGraph(); else render();
  // Persist to Firestore
  if(COLL) COLL.doc(feed.id).set(feed).catch(e=>console.error('add:',e));
}

// ── CSV EXPORT ──
function exportCSV(){
  const hdr='Date,Time,Amount (mL),Diaper,VitaminD,Notes';
  const rows=feeds.slice().sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).map(f=>{
    const n=(f.notes||'').replace(/"/g,'""');
    return f.date+','+f.time+','+(f.ml===''?'':f.ml)+','+(f.diaper||'')+(f.vitd?',yes':',')+',"'+n+'"';
  });
  const blob=new Blob([[hdr,...rows].join('\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='jojos-log-'+today()+'.csv'; a.click();
}

function toggleGraph(){
  gvis=!gvis;
  document.getElementById('app').style.display=gvis?'none':'';
  document.getElementById('gview').classList.toggle('vis',gvis);
  document.getElementById('gbtn').classList.toggle('on',gvis);
  if(gvis)renderGraph();
}

function makeBars(days,barClr,todayClr){
  const N=days.length; if(!N)return'';
  const BW=Math.max(Math.floor(320/N),5),GAP=1;
  const W=N*(BW+GAP)+4,CHART_H=130,LABEL_H=20,VAL_H=16;
  const TOT_H=CHART_H+LABEL_H+VAL_H,BASE_Y=VAL_H+CHART_H;
  const maxVal=Math.max(...days.map(d=>d.val),1);
  let s='<svg width="'+W+'" height="'+TOT_H+'" viewBox="0 0 '+W+' '+TOT_H+'" xmlns="http://www.w3.org/2000/svg" style="display:block;">';
  s+='<line x1="0" y1="'+BASE_Y+'" x2="'+W+'" y2="'+BASE_Y+'" stroke="#DDD6CE" stroke-width="1"/>';
  days.forEach((d,i)=>{
    const x=2+i*(BW+GAP),cx=x+BW/2;
    const barH=d.val>0?Math.max(Math.round((d.val/maxVal)*CHART_H),3):0;
    const barY=BASE_Y-barH,clr=d.isToday?todayClr:barClr;
    if(barH>0){ s+='<rect x="'+x+'" y="'+barY+'" width="'+BW+'" height="'+barH+'" rx="2" fill="'+clr+'"/>'; }
    else { s+='<rect x="'+x+'" y="'+(BASE_Y-2)+'" width="'+BW+'" height="2" rx="1" fill="#E0D8D0"/>'; }
    if(d.val>0&&d.lbl){ s+='<text x="'+cx+'" y="'+(barY-3)+'" text-anchor="middle" font-size="8" fill="#9A8F89" font-family="Nunito,sans-serif">'+Math.round(d.val)+'</text>'; }
    if(d.lbl){
      const fc=d.isToday?todayClr:'#9A8F89',fw=d.isToday?'700':'400';
      s+='<text x="'+cx+'" y="'+(BASE_Y+13)+'" text-anchor="middle" font-size="9" fill="'+fc+'" font-family="Nunito,sans-serif" font-weight="'+fw+'">'+d.lbl+'</text>';
    }
  });
  s+='</svg>';
  return s;
}

function renderGraph(){
  const td=today();
  const DT={},MT={};
  feeds.forEach(f=>{ DT[f.date]=(DT[f.date]||0)+(+f.ml||0); const mk=f.date.slice(0,7); MT[mk]=(MT[mk]||0)+(+f.ml||0); });
  const months=Object.keys(MT).sort();
  let html='';
  months.forEach(mk=>{
    const d=new Date(mk+'-01T12:00:00');
    const mLabel=d.toLocaleDateString('en-CA',{month:'long',year:'numeric'});
    const dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    const days=[];
    for(let i=1;i<=dim;i++){
      const dk=mk+'-'+pz(i); if(dk>td)break;
      const val=DT[dk]||0,isToday=dk===td;
      const lbl=(i===1||i%5===0||isToday)?String(i):'';
      days.push({val,lbl,isToday});
    }
    if(!days.length)return;
    const tot=days.reduce((s,d)=>s+d.val,0);
    html+='<div class="gsec"><div class="gtit">'+mLabel+' <span style="font-size:11px;color:var(--muted);font-weight:600;">'+tot.toLocaleString()+' mL</span></div>'+
      '<div class="gchart">'+makeBars(days,'#7DBFA5','#E8A598')+'</div></div>';
  });
  const MN={'03':'Mar','04':'Apr','05':'May','06':'Jun','07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'};
  const yr=months.filter(m=>m.startsWith('2026')&&m>='2026-03');
  if(yr.length){
    const tot2=yr.reduce((s,m)=>s+MT[m],0);
    const mdays=yr.map(mk=>({val:MT[mk]||0,lbl:MN[mk.slice(5)]||mk.slice(5),isToday:mk===td.slice(0,7)}));
    html+='<div class="gsec"><div class="gtit">2026 by month <span style="font-size:11px;color:var(--muted);font-weight:600;">'+tot2.toLocaleString()+' mL</span></div>'+
      '<div class="gchart">'+makeBars(mdays,'#B4A0D4','#E8A598')+'</div></div>';
  }
  document.getElementById('gview').innerHTML=html;
}
